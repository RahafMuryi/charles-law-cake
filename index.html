
<style>
@keyframes bubble-pulse { 0%,100%{r:5;opacity:.9} 50%{r:7;opacity:1} }
@keyframes bubble-rise  { 0%{transform:translateY(0)} 100%{transform:translateY(-18px);opacity:0} }
@keyframes steam { 0%{opacity:0;transform:translateY(0) scaleX(1)} 30%{opacity:.7} 100%{opacity:0;transform:translateY(-30px) scaleX(1.4)} }
@keyframes flicker { 0%,100%{opacity:1;transform:scaleY(1)} 50%{opacity:.8;transform:scaleY(.88)} }
@keyframes shimmer { 0%,100%{opacity:.5} 50%{opacity:1} }
@keyframes glow-pulse { 0%,100%{opacity:.15} 50%{opacity:.35} }
@media (prefers-reduced-motion: no-preference) {
  .bubble-anim { animation: bubble-pulse 1.4s ease-in-out infinite; }
  .bubble-rise  { animation: bubble-rise 2.2s ease-in infinite; }
  .steam-path   { animation: steam 2.6s ease-out infinite; }
  .flame        { animation: flicker .55s ease-in-out infinite alternate; }
  .shimmer      { animation: shimmer 1.2s ease-in-out infinite; }
  .glow-zone    { animation: glow-pulse 2s ease-in-out infinite; }
}
.step-btn { cursor:pointer; border:1.5px solid #534AB7; background:#EEEDFE; color:#3C3489; border-radius:8px; padding:7px 18px; font-size:13px; font-weight:500; transition:background .15s,transform .1s; }
.step-btn:hover { background:#CECBF6; }
.step-btn:active { transform:scale(.97); }
.step-btn.active { background:#534AB7; color:#fff; border-color:#534AB7; }
.fact-card { border-radius:10px; padding:10px 14px; font-size:13px; line-height:1.5; margin-top:6px; }
</style>

<h2 class="sr-only">Interactive Charles' Law diagram: how baking a cake demonstrates that heating gas makes it expand, causing the cake to rise.</h2>

<div style="display:flex;gap:8px;justify-content:center;margin:12px 0 10px;flex-wrap:wrap;">
  <button class="step-btn active" onclick="setStep(0)">Cold batter</button>
  <button class="step-btn" onclick="setStep(1)">Warming up</button>
  <button class="step-btn" onclick="setStep(2)">Hot oven</button>
  <button class="step-btn" onclick="setStep(3)">Cake rises!</button>
</div>

  <circle cx="438" cy="296" r="10" fill="#E24B4A"/>
  <rect id="therm-fill" x="432" y="228" width="12" height="68" rx="4" fill="#E24B4A"/>
  <!-- Tick marks -->
  <line x1="446" y1="108" x2="452" y2="108" stroke="#888780" stroke-width="1"/>
  <line x1="446" y1="148" x2="452" y2="148" stroke="#888780" stroke-width="1"/>
  <line x1="446" y1="188" x2="452" y2="188" stroke="#888780" stroke-width="1"/>
  <line x1="446" y1="228" x2="452" y2="228" stroke="#888780" stroke-width="1"/>
  <line x1="446" y1="268" x2="452" y2="268" stroke="#888780" stroke-width="1"/>
  <text class="ts" x="456" y="112" fill="#633806" font-size="11">220°C</text>

  <!-- ===== LABEL CALLOUTS (right panel) ===== -->
  <!-- Heat -->
  <rect x="492" y="76" width="172" height="52" rx="10" fill="#FCEBEB" stroke="#E24B4A" stroke-width="1.2"/>

<!-- Fact card below SVG -->
<div id="fact-card" class="fact-card" style="background:#EEEDFE;color:#3C3489;border:1px solid #AFA9EC;">
  <strong>Cold batter (20 °C)</strong> — Gas particles are slow and close together. The batter is flat and dense. No rising yet!
</div>


<script>
const steps = [
  {
    temp: 20, dialAngle: -130,
    domeD: "M122,310 Q265,305 408,310 Z",
    crust1: "M130,308 Q265,304 400,308",
    crust2: "M125,312 Q265,307 405,312",
    thermH: 8, thermY: 284,
    heatWaves: 0, flames: 0, steam: 0, arrows: 0, icing: 0, glow: 0.15,
    bubbleScale: 0.5,
    label: "Cold batter (20 °C)",
    fact: "<strong>Cold batter (20 °C)</strong> — Gas particles are slow and close together. The batter is flat and dense. No rising yet!",
    cardBg:"#EEEDFE", cardColor:"#3C3489", cardBorder:"#AFA9EC"
  },
  {
    temp: 120, dialAngle: -60,
    domeD: "M122,295 Q265,275 408,295 Z",
    crust1: "M130,292 Q265,272 400,292",
    crust2: "M125,297 Q265,277 405,297",
    thermH: 60, thermY: 232,
    heatWaves: 0.5, flames: 0.6, steam: 0, arrows: 0.3, icing: 0, glow: 0.25,
    bubbleScale: 0.85,
    label: "Warming up (120 °C)",
    fact: "<strong>Warming up (120 °C)</strong> — Gas particles speed up and push outward. Bubbles start to grow. The batter begins to dome.",
    cardBg:"#FAEEDA", cardColor:"#633806", cardBorder:"#EF9F27"
  },
  {
    temp: 180, dialAngle: 20,
    domeD: "M122,272 Q265,238 408,272 Z",
    crust1: "M130,268 Q265,234 400,268",
    crust2: "M125,274 Q265,240 405,274",
    thermH: 120, thermY: 172,
    heatWaves: 1, flames: 1, steam: 0.7, arrows: 1, icing: 0, glow: 0.4,
    bubbleScale: 1.3,
    label: "Hot oven (180 °C)",
    fact: "<strong>Hot oven (180 °C)</strong> — Gas volume has greatly increased (Charles' Law: V/T = constant). Bubbles are large. The cake rises rapidly!",
    cardBg:"#FCEBEB", cardColor:"#791F1F", cardBorder:"#E24B4A"
  },
  {
    temp: 200, dialAngle: 60,
    domeD: "M122,252 Q265,210 408,252 Z",
    crust1: "M130,248 Q265,206 400,248",
    crust2: "M125,254 Q265,212 405,254",
    thermH: 162, thermY: 130,
    heatWaves: 1, flames: 1, steam: 1, arrows: 1, icing: 1, glow: 0.5,
    bubbleScale: 1.6,
    label: "Cake rises! (200 °C)",
    fact: "<strong>Cake rises! (200 °C)</strong> — Maximum volume. The CO\u2082 and air bubbles have expanded fully, making the cake tall, fluffy, and golden. Charles' Law in action!",
    cardBg:"#E1F5EE", cardColor:"#085041", cardBorder:"#1D9E75"
  }
];

let current = 0;

function lerp(a,b,t){ return a + (b-a)*t; }

function setStep(i) {
  current = i;
  const s = steps[i];
  const svg = document.getElementById('cake-svg');

  document.querySelectorAll('.step-btn').forEach((b,j) => b.classList.toggle('active', j===i));

  svg.getElementById('cake-dome').setAttribute('d', s.domeD);
  svg.getElementById('crust1').setAttribute('d', s.crust1);
  svg.getElementById('crust2').setAttribute('d', s.crust2);

  const thermFill = svg.getElementById('therm-fill');
  thermFill.setAttribute('y', s.thermY);
  thermFill.setAttribute('height', s.thermH);

  svg.getElementById('temp-label').textContent = s.temp + '°C';

  svg.getElementById('heat-waves').style.opacity = s.heatWaves;
  svg.getElementById('flames').style.opacity = s.flames;
  svg.getElementById('steam-group').style.opacity = s.steam;
  svg.getElementById('rise-arrows').style.opacity = s.arrows;
  svg.getElementById('icing').style.opacity = s.icing;
  svg.getElementById('element').style.opacity = s.heatWaves * 0.6;

  const glow = svg.getElementById('glow-zone');
  glow.style.opacity = s.glow;

  const bsc = s.bubbleScale;
  const bubbleCxs = [165,205,248,290,333,373,228,312];
  const bubbleCys = [320,313,308,305,310,318,326,324];
  const baseRs    = [5,4,6,5,4.5,5,3.5,4];
  const bubbles   = svg.getElementById('bubbles').querySelectorAll('circle');
  bubbles.forEach((c,k) => {
    const nr = Math.min(baseRs[k] * bsc, 11);
    c.setAttribute('r', nr);
    const newY = bubbleCys[k] - (nr - baseRs[k]) * 1.2;
    c.setAttribute('cy', newY);
  });

  const dialHand = svg.getElementById('dial-hand');
  const ang = s.dialAngle * Math.PI / 180;
  const cx=265, cy=408, len=12;
  dialHand.setAttribute('x2', cx + Math.sin(ang)*len);
  dialHand.setAttribute('y2', cy - Math.cos(ang)*len);

  const fc = document.getElementById('fact-card');
  fc.innerHTML = s.fact;
  fc.style.background = s.cardBg;
  fc.style.color = s.cardColor;
  fc.style.border = '1px solid ' + s.cardBorder;

  const batH = i===0?38 : i===1?55 : i===2?76 : 96;
  const batY = 348 - batH;
  svg.getElementById('batter-body').setAttribute('y', batY);
  svg.getElementById('batter-body').setAttribute('height', batH);
}

setStep(0);
</script>
